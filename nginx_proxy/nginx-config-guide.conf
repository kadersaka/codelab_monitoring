# ═══════════════════════════════════════════════════════════════
# Configuration Nginx — À utiliser dans Nginx Proxy Manager
# via l'onglet "Advanced" de chaque Proxy Host
# ═══════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────────
# PROXY HOST 1 : Grafana
# Domain : monitoring.codelab.bj
# Forward : grafana:3000
# SSL    : Let's Encrypt (activer dans NPM)
# Advanced config (coller dans le champ "Custom Nginx Configuration") :
# ────────────────────────────────────────────────────────────────

# Sécurité headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src * data:;" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Taille max des dashboards importés
client_max_body_size 20M;

# WebSocket pour Grafana Live
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";


# ────────────────────────────────────────────────────────────────
# PROXY HOST 2 : Endpoint Loki Push (pour agents Promtail distants)
# Sous-domaine dédié (retenu pour CodeLab) :
# Domain : loki.codelab.bj
# Forward : loki:3100
# 
# IMPORTANT : Activer Basic Auth dans NPM pour ce proxy host
# (onglet "Access List" → créer une liste avec les users Loki)
# ────────────────────────────────────────────────────────────────

# Limiter les méthodes autorisées (Promtail n'utilise que POST et GET)
limit_except POST GET {
    deny all;
}

# Rate limiting pour éviter le flood de logs
limit_req_zone $binary_remote_addr zone=loki_push:10m rate=10r/s;
limit_req zone=loki_push burst=50 nodelay;

# Taille max des batches Loki (1MB par défaut dans Promtail)
client_max_body_size 5M;


# ────────────────────────────────────────────────────────────────
# PROXY HOST 3 : Portainer
# Domain : portainer.codelab.bj
# Forward : portainer:9443
# SSL    : Let's Encrypt
# ────────────────────────────────────────────────────────────────

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Strict-Transport-Security "max-age=31536000" always;

proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Timeout plus long pour les opérations Docker
proxy_read_timeout 300;
proxy_connect_timeout 300;
proxy_send_timeout 300;


