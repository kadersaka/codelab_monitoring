networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  loki_data:
  minio_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  portainer_data:

services:

  # ═══════════════════════════════════════════════════
  # MINIO — Stockage objet pour Loki
  # ═══════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Crée le bucket Loki au démarrage
  minio_init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing myminio/loki;
      /usr/bin/mc mb --ignore-existing myminio/loki-ruler;
      /usr/bin/mc anonymous set public myminio/loki;
      echo 'MinIO buckets créés.';
      exit 0;
      "
    networks:
      - monitoring
    restart: on-failure

  # ═══════════════════════════════════════════════════
  # LOKI — Agrégation de logs
  # ═══════════════════════════════════════════════════
  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    command:
      - -config.file=/etc/loki/config.yml
      - -config.expand-env=true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./configs/loki.yml:/etc/loki/config.yml:ro
      - ./configs/retention-overrides.yml:/etc/loki/retention-overrides.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # ═══════════════════════════════════════════════════
  # PROMTAIL — Agent de collecte logs (local = Peramix)
  # ═══════════════════════════════════════════════════
  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./configs/promtail-local.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # ═══════════════════════════════════════════════════
  # PROMETHEUS — Métriques
  # ═══════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=180d'
      - '--storage.tsdb.retention.size=15GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'

  # ═══════════════════════════════════════════════════
  # ALERTMANAGER — Gestion des alertes
  # ═══════════════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://monitoring.codelab.bj/alertmanager'
    volumes:
      - ./configs/alertmanager.yml:/etc/alertmanager/config.yml:ro
      - ./secrets/alertmanager_smtp_password.txt:/etc/alertmanager/smtp_password:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # ═══════════════════════════════════════════════════
  # TELEGRAM — Webhook Alertmanager → API Telegram (token dans .env)
  # ═══════════════════════════════════════════════════
  alertmanager_telegram:
    image: enmanuelmoreira/alertmanager-telegram:edge
    container_name: alertmanager_telegram
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # ═══════════════════════════════════════════════════
  # GRAFANA — Visualisation
  # ═══════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    environment:
      # Serveur
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      # Admin
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      # Utilisateurs
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      # Analytics (désactiver les données vers Grafana Inc.)
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      # SMTP pour les alertes email
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM}
      GF_SMTP_FROM_NAME: "CodeLab Monitoring"
      GF_SMTP_SKIP_VERIFY: "false"
      # Plugins
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/provisioning:/etc/grafana/provisioning/notifiers:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ═══════════════════════════════════════════════════
  # NODE EXPORTER — Métriques système Peramix
  # ═══════════════════════════════════════════════════
  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node_exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.systemd'
      - '--collector.processes'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/systemd/private:/run/systemd/private:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring
    pid: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  # ═══════════════════════════════════════════════════
  # CADVISOR — Métriques des containers Docker
  # ═══════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    command:
      - '--housekeeping_interval=30s'
      - '--max_housekeeping_interval=35s'
      - '--event_storage_event_limit=default=0'
      - '--event_storage_age_limit=default=0'
      - '--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - monitoring
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ═══════════════════════════════════════════════════
  # PORTAINER — Interface de gestion Docker
  # ═══════════════════════════════════════════════════
  portainer:
    image: portainer/portainer-ce:2.19.4
    container_name: portainer
    command: --admin-password-file /run/secrets/portainer_password
    secrets:
      - portainer_password
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "127.0.0.1:9443:9443"
      - "127.0.0.1:8000:8000"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ═══════════════════════════════════════════════════
  # NGINX PROXY MANAGER — Reverse proxy + TLS
  # ═══════════════════════════════════════════════════
  nginx_proxy:
    image: jc21/nginx-proxy-manager:2.11.1
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:81:81"   # Interface admin NPM
    volumes:
      - ./nginx_proxy/data:/data
      - ./nginx_proxy/letsencrypt:/etc/letsencrypt
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 10s
      timeout: 3s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

secrets:
  portainer_password:
    file: ./secrets/portainer_password.txt
