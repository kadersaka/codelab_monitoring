# ═══════════════════════════════════════════════════════════════
# Prometheus Configuration
# Scrape toutes les métriques de tous les serveurs CodeLab
# ═══════════════════════════════════════════════════════════════

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 20s
  external_labels:
    monitor: 'codelab-monitoring'
    environment: 'production'

# ── Fichiers de règles d'alertes ────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/infra.yml
  - /etc/prometheus/alerts/paygate.yml
  - /etc/prometheus/alerts/codelab.yml

# ── Alertmanager ────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

# ══════════════════════════════════════════════════════════════
# SCRAPE CONFIGS
# ══════════════════════════════════════════════════════════════
scrape_configs:

  # ── Prometheus lui-même ────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - target_label: server
        replacement: peramix

  # ── Node Exporter — Peramix (serveur monitoring) ──────────────
  - job_name: node_peramix
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          server: peramix
          role: monitoring
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+).*'
        replacement: 'peramix'

  # ── cAdvisor — Containers Docker sur Peramix ──────────────────
  - job_name: cadvisor_peramix
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          server: peramix

