# ═══════════════════════════════════════════════════════════════
# Prometheus Configuration
# Scrape toutes les métriques de tous les serveurs CodeLab
# ═══════════════════════════════════════════════════════════════

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 20s
  external_labels:
    monitor: 'codelab-monitoring'
    environment: 'production'

# ── Fichiers de règles d'alertes ────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/infra.yml
  - /etc/prometheus/alerts/paygate.yml
  - /etc/prometheus/alerts/codelab.yml

# ── Alertmanager ────────────────────────────────────────────────
alerting:
  alertmanagers:
    - path_prefix: /alertmanager
      static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

# ══════════════════════════════════════════════════════════════
# SCRAPE CONFIGS
# ══════════════════════════════════════════════════════════════
scrape_configs:

  # ── Prometheus lui-même ────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - target_label: server
        replacement: peramix

  # ── Node Exporter — Peramix (serveur monitoring) ──────────────
  - job_name: node_peramix
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          server: peramix
          role: monitoring
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+).*'
        replacement: 'peramix'

  # ── cAdvisor — Containers Docker sur Peramix ──────────────────
  - job_name: cadvisor_peramix
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          server: peramix

  - job_name: node_cenof
    static_configs:
      - targets: ['77.37.87.37:9100']
        labels:
          server: cenof-server
          project: cenof
          role: application

  # ── Django Cenof ──────────────────────────────────────────────
  - job_name: django_cenof
    static_configs:
      - targets: ['api.cenof.finance']
        labels:
          server: cenof-server
          project: cenof
          app: django
  # -- Node Exporter - Cenof (à activer après configuration)
  # - job_name: node_cenof
  #   static_configs:
  #     - targets: ['77.37.87.37:9100']
  #       labels:
  #         server: cenof-server
  #         project: cenof
  #         role: application  # ── Django Cenof (à activer après configuration)
  # - job_name: django_cenof
  #   static_configs:
  #     - targets: ['api.cenof.finance']
  #       labels:
  #         server: cenof-server
  #         project: cenof
  #         app: django
  #   metrics_path: /metrics
  #   scheme: https

  # ── Node Exporter — Blaffa Pay ───────────────────────────────
  - job_name: node_blaffa_pay
    static_configs:
      - targets: ['72.60.47.24:9100']
        labels:
          server: blaffa-pay-server
          project: blaffa_pay
          role: application

  # ── Django Blaffa Pay ─────────────────────────────────────────
  - job_name: django_blaffa_pay
    static_configs:
      - targets: ['connect.api.blaffa.net']
        labels:
          server: blaffa-pay-server
          project: blaffa_pay
          app: django
    metrics_path: /metrics/
    scheme: https
