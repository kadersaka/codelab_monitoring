# ═══════════════════════════════════════════════════════════════
# Loki Configuration
# Backend : MinIO (stockage objet local)
# Auth : multi-tenant activé
# ═══════════════════════════════════════════════════════════════

auth_enabled: true

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
  http_server_read_timeout: 60s
  http_server_write_timeout: 60s

# ── Ingester ────────────────────────────────────────────────────
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_transfer_retries: 0
  wal:
    enabled: true
    dir: /loki/wal

# ── Schéma de stockage ──────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: s3
      schema: v12
      index:
        prefix: loki_index_
        period: 24h

# ── Stockage : MinIO via protocole S3 ───────────────────────────
storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
    cache_ttl: 24h
    shared_store: s3
  aws:
    s3: http://minio:9000
    bucketnames: loki
    access_key_id: ${MINIO_ROOT_USER}
    secret_access_key: ${MINIO_ROOT_PASSWORD}
    s3forcepathstyle: true
    insecure: true

# ── Compacteur + Rétention ──────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  shared_store: s3
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# ── Limites globales ─────────────────────────────────────────────
limits_config:
  # Rétention par défaut (90 jours)
  retention_period: 90d
  # Ingestion
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Requêtes
  max_query_series: 5000
  max_query_lookback: 365d
  max_query_length: 721h
  max_entries_limit_per_query: 50000
  # Labels
  max_label_names_per_series: 30
  max_label_value_length: 4096
  # Streams
  max_streams_per_user: 10000
  # Rejeter les logs trop anciens (anti-erreurs Promtail)
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 jours

# ── Rétention par tenant ─────────────────────────────────────────
# Override par tenant dans la requête header X-Scope-OrgID
# Configuré ici pour chaque projet
per_tenant_override_config: /etc/loki/retention-overrides.yml

# ── Ruler (alertes Loki) ────────────────────────────────────────
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# ── Query Range ─────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 500
  cache_results: true
  parallelise_shardable_queries: true

# ── Frontend ────────────────────────────────────────────────────
frontend:
  log_queries_longer_than: 5s
  compress_responses: true

# ── Cache ───────────────────────────────────────────────────────
chunk_store_config:
  max_look_back_period: 365d

# table_manager retiré : rétention assurée par compactor + limits_config (Loki 2.9+ / boltdb-shipper).
