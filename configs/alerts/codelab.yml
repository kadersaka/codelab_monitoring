# ═══════════════════════════════════════════════════════════════
# Alertes Prometheus — Projets CodeLab (génériques)
# S'applique à tous les projets Django
# ═══════════════════════════════════════════════════════════════

groups:

  - name: codelab.django
    rules:

      - alert: AppDjangoIndisponible
        expr: up{job=~"django_.*"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 App Django indisponible : {{ $labels.project }}"
          description: |
            L'application {{ $labels.project }} sur {{ $labels.server }} ne répond plus.
            🔍 Voir les logs : https://monitoring.codelab.bj/explore?orgId=1&left=%7B%22datasource%22:%22loki-{{ $labels.project }}%22,%22queries%22:%5B%7B%22expr%22:%22%7Bapp%3D%5C%22{{ $labels.project }}%5C%22%7D%20%7C%3D%20%5C%22ERROR%5C%22%22%7D%5D%7D

      - alert: ErreursDjango5xx
        expr: |
          rate(django_http_responses_before_middlewares_total{
            status=~"5.."
          }[5m]) > 0.01
        for: 1m
        labels:
          severity: warning
          category: application
        annotations:
          summary: '⚠️ Erreurs 5xx — {{ $labels.project }} ({{ printf "%.2f" $value }}/s)'
          description: |
            Erreurs 5xx détectées sur {{ $labels.job }} — {{ $labels.server }}.
            Taux actuel : {{ printf "%.3f" $value }} req/s
            🔍 Voir les logs : https://monitoring.codelab.bj/explore?orgId=1&left=%7B%22datasource%22:%22loki-cenof%22,%22queries%22:%5B%7B%22expr%22:%22%7Bapp%3D%5C%22cenof%5C%22,job%3D%5C%22django%5C%22%7D%20%7C%3D%20%5C%22ERROR%5C%22%22%7D%5D%7D

  - name: codelab.ssl
    rules:

      - alert: CertificatSSLExpireBientôt
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 86400 * 30
        for: 1h
        labels:
          severity: warning
          category: ssl
        annotations:
          summary: "⚠️ Certificat SSL expire dans {{ $value | humanizeDuration }} — {{ $labels.instance }}"
          description: "Renouveler le certificat Let's Encrypt pour {{ $labels.instance }}."

      - alert: CertificatSSLExpireCritique
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: critical
          category: ssl
        annotations:
          summary: "🔴 Certificat SSL expire dans {{ $value | humanizeDuration }} — {{ $labels.instance }}"
