# ═══════════════════════════════════════════════════════════════
# Alertes Prometheus — Infrastructure
# Couvre : disponibilité, CPU, RAM, disque, réseau
# ═══════════════════════════════════════════════════════════════

groups:

  - name: infra.availability
    interval: 30s
    rules:

      - alert: ServeurInjoignable
        expr: up{job!~"django_.*"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "🔴 Serveur injoignable : {{ $labels.instance }}"
          description: |
            Le serveur {{ $labels.server }} ({{ $labels.instance }}) ne répond plus depuis 1 minute.
            Job: {{ $labels.job }}
          runbook: "Vérifier SSH, firewall, et état du process."

      - alert: NodeExporterInjoignable
        expr: up{job=~"node_.*"} == 0
        for: 2m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "⚠️ Node Exporter injoignable : {{ $labels.server }}"
          description: "Impossible de scraper les métriques de {{ $labels.server }} depuis 2 minutes."

  - name: infra.cpu
    rules:

      - alert: CPUElevé
        expr: |
          100 - (avg by (instance, server) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: '⚠️ CPU élevé sur {{ $labels.server }} ({{ printf "%.1f" $value }}%)'
          description: "Le CPU de {{ $labels.server }} dépasse 85% depuis 5 minutes."

      - alert: CPUCritique
        expr: |
          100 - (avg by (instance, server) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: '🔴 CPU critique sur {{ $labels.server }} ({{ printf "%.1f" $value }}%)'
          description: 'CPU à {{ printf "%.1f" $value }}% sur {{ $labels.server }} depuis 2 minutes.'

  - name: infra.memory
    rules:

      - alert: MémoireElevée
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: '⚠️ Mémoire élevée sur {{ $labels.server }} ({{ printf "%.1f" $value }}%)'
          description: 'Utilisation RAM : {{ printf "%.1f" $value }}% sur {{ $labels.server }}.'

      - alert: MémoireCritique
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: '🔴 Mémoire critique sur {{ $labels.server }} ({{ printf "%.1f" $value }}%)'
          description: "RAM presque épuisée sur {{ $labels.server }}. Risque d'OOM Kill imminent."

  - name: infra.disk
    rules:

      - alert: DisqueElevé
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} 
               / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 75
        for: 10m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: '⚠️ Disque à {{ printf "%.1f" $value }}% sur {{ $labels.server }}'
          description: 'Partition {{ $labels.mountpoint }} à {{ printf "%.1f" $value }}% sur {{ $labels.server }}.'

      - alert: DisqueCritique
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} 
               / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 90
        for: 5m
        labels:
          severity: critical
          category: disk
        annotations:
          summary: '🔴 Disque critique {{ printf "%.1f" $value }}% sur {{ $labels.server }}'
          description: 'Partition {{ $labels.mountpoint }} à {{ printf "%.1f" $value }}% sur {{ $labels.server }}. Action immédiate requise pour éviter une coupure de service.'

      - alert: DisquePleinDansXHeures
        expr: |
          predict_linear(
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}[6h], 
            24 * 3600
          ) < 0
        for: 30m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "⚠️ {{ $labels.server }} — disque plein dans moins de 24h"
          description: "Au rythme actuel, la partition {{ $labels.mountpoint }} sera pleine dans 24h."

  - name: infra.network
    rules:

      - alert: TraficRéseauElevé
        expr: |
          irate(node_network_receive_bytes_total{device!~"lo|docker.*|veth.*"}[5m]) > 250000000
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "⚠️ Trafic entrant élevé sur {{ $labels.server }} ({{ $value | humanize }}B/s)"

  - name: infra.containers
    rules:

      - alert: ContainerArrêté
        expr: |
          count by (name) (container_last_seen{name!=""}) == 0
        for: 2m
        labels:
          severity: warning
          category: containers
        annotations:
          summary: "⚠️ Container arrêté : {{ $labels.name }}"

      - alert: ContainerRedémarreTropSouvent
        expr: |
          increase(container_start_time_seconds{name!=""}[1h]) > 3
        for: 5m
        labels:
          severity: warning
          category: containers
        annotations:
          summary: "⚠️ Container en boucle de redémarrage : {{ $labels.name }}"
          description: "{{ $labels.name }} a redémarré plus de 3 fois en 1 heure."
