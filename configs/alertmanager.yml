# ═══════════════════════════════════════════════════════════════
# Alertmanager Configuration
# Routing : critical → Email + Telegram
#           warning  → Email seulement
# Inhibition : si serveur down, supprimer les alertes enfants
# ═══════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'codelabmonitoring@gmail.com'
  smtp_auth_username: 'codelabmonitoring@gmail.com'
  # Mot de passe : .env → sync-secrets → secret Compose alertmanager_smtp_password
  smtp_auth_password_file: '/run/secrets/alertmanager_smtp_password'
  smtp_require_tls: true

# ── Templates ───────────────────────────────────────────────────
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ── Routing ────────────────────────────────────────────────────
route:
  group_by: ['alertname', 'project', 'server']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default_email

  routes:
    # Alertes critiques PayGate → Email + Telegram immédiatement
    - match:
        severity: critical
        project: paygate
      receiver: paygate_critical
      group_wait: 10s
      repeat_interval: 30m

    # Toutes alertes critiques → Email + Telegram
    - match:
        severity: critical
      receiver: critical_all
      group_wait: 15s
      repeat_interval: 1h

    # Alertes sécurité → traitement prioritaire
    - match:
        category: security
      receiver: security_alerts
      group_wait: 10s
      repeat_interval: 15m

    # Alertes disque → avertissement précoce
    - match:
        category: disk
      receiver: disk_alerts
      repeat_interval: 6h

    # Tout le reste → email standard
    - match_re:
        severity: warning|info
      receiver: default_email
      repeat_interval: 6h

# ── Inhibitions ─────────────────────────────────────────────────
# Si un serveur est complètement down, ne pas spammer avec les alertes
# applicatives qui en découlent
inhibit_rules:
  - source_match:
      alertname: ServeurInjoignable
    target_match_re:
      alertname: .+
    equal: ['server']

  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'project']

# ── Receivers ───────────────────────────────────────────────────
receivers:

  # Email par défaut (warnings)
  - name: default_email
    email_configs:
      - to: 'codelabbj@gmail.com'
        send_resolved: true
        headers:
          Subject: '[CodeLab Monitoring] {{ .GroupLabels.alertname }} — {{ .Status | toUpper }}'
        html: |
          <h3>{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <p><b>{{ .Annotations.summary }}</b><br>
          {{ .Annotations.description }}</p>
          <p>Labels: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}</p>
          {{ end }}

  # Alertes critiques PayGate : Email + Telegram
  - name: paygate_critical
    email_configs:
      - to: 'codelabbj@gmail.com'
        send_resolved: true
        headers:
          Subject: '🔴 [PayGate CRITIQUE] {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: 'http://alertmanager_telegram:8080/alerts'
        send_resolved: true

  # Toutes alertes critiques
  - name: critical_all
    email_configs:
      - to: 'codelabbj@gmail.com'
        send_resolved: true
        headers:
          Subject: '🔴 [CRITIQUE] {{ .GroupLabels.alertname }} — {{ .GroupLabels.server }}'
    webhook_configs:
      - url: 'http://alertmanager_telegram:8080/alerts'
        send_resolved: true

  # Alertes sécurité
  - name: security_alerts
    email_configs:
      - to: 'codelabbj@gmail.com'
        send_resolved: false   # Ne pas notifier quand ça se résout automatiquement
        headers:
          Subject: '🛡️ [SÉCURITÉ] {{ .GroupLabels.alertname }}'

  # Alertes disque
  - name: disk_alerts
    email_configs:
      - to: 'codelabbj@gmail.com'
        send_resolved: true
        headers:
          Subject: '💾 [DISQUE] {{ .GroupLabels.alertname }} — {{ .GroupLabels.server }}'
