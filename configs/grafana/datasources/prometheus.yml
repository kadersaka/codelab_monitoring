# ═══════════════════════════════════════════════════════════════
# Grafana — Datasource Prometheus
# ═══════════════════════════════════════════════════════════════

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus-main
    isDefault: true
    jsonData:
      timeInterval: '30s'
      queryTimeout: '60s'
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: loki-main
    editable: false
