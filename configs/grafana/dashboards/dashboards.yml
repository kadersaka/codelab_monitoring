# ═══════════════════════════════════════════════════════════════
# Grafana — Provisioning des dashboards
# Les dashboards JSON sont chargés automatiquement depuis ce dossier
# ═══════════════════════════════════════════════════════════════

apiVersion: 1

providers:
  - name: CodeLab Dashboards
    orgId: 1
    folder: CodeLab
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
