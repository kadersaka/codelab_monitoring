# ═══════════════════════════════════════════════════════════════
# Promtail — Configuration locale (serveur Peramix)
# Collecte les logs du serveur de monitoring lui-même
# ═══════════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/promtail-positions.yaml
  sync_period: 10s

# ── Destination : Loki local ─────────────────────────────────────
clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: peramix
    # Pas de basic auth car connexion réseau Docker interne
    batchwait: 1s
    batchsize: 1048576   # 1 MB
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

# ── Sources de logs ──────────────────────────────────────────────
scrape_configs:

  # Logs système Linux
  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          server: peramix
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+[\d:]+)\s+(?P<hostname>\S+)\s+(?P<process>\S+):\s+(?P<message>.*)$'
      - labels:
          process:

  # Logs auth (connexions SSH, sudo, etc.)
  - job_name: auth
    static_configs:
      - targets: [localhost]
        labels:
          job: auth
          server: peramix
          __path__: /var/log/auth.log
    pipeline_stages:
      - multiline:
          firstline: '^\w+\s+\d+'
          max_wait_time: 3s

  # Logs des containers Docker
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
      - labels:
          level:
          logger:
      # Supprimer les logs de santé (trop verbeux)
      - drop:
          expression: '.*health.*'
          drop_counter_reason: health_check
